<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Q-BU AR（マーカー）</title>
<style>
  :root{ --border:rgba(255,255,255,.5); --accent:#10b981; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#000;
    font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;-webkit-user-select:none;user-select:none}
  /* 上部UI */
  .top{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:8px;
    padding:10px 12px;pointer-events:none}
  .top > *{pointer-events:auto}
  .btn{appearance:none;cursor:pointer;border:none;border-radius:12px;padding:11px 15px;font-weight:1000;
    font-size:14px;color:#0b0f18;background:rgba(255,255,255,.92);box-shadow:0 6px 16px rgba(0,0,0,.3)}
  .btn:active{transform:scale(.97)}
  .pill{margin-left:auto;background:rgba(0,0,0,.55);color:#fff;border-radius:999px;padding:9px 14px;
    font-weight:900;font-size:13px}
  .seg{display:flex;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.92);box-shadow:0 6px 16px rgba(0,0,0,.3)}
  .seg button{appearance:none;border:none;background:transparent;padding:11px 16px;font-weight:1000;font-size:14px;cursor:pointer;color:#5b6472}
  .seg button.on.make{background:rgba(59,130,246,.22);color:#1d4ed8}
  .seg button.on.erase{background:rgba(244,63,94,.22);color:#be123c}
  /* マーカー案内 */
  #guide{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:10;
    background:rgba(0,0,0,.6);color:#fff;border-radius:14px;padding:12px 18px;font-weight:800;font-size:14px;
    text-align:center;line-height:1.5;max-width:90vw}
  #guide.hide{display:none}
  /* カメラ映像(video)と3D(canvas)を「同一の拡縮」で画面いっぱいに（重なりズレ・立方体の歪み対策）。*/
  /* AR.jsはvideoを z-index:-2 で置く→黒背景の裏に回って真っ黒になるので前面側へ上書き。*/
  #arjs-video, .arjs-video, video, .a-canvas{
    position:fixed!important;top:0!important;left:0!important;
    width:100%!important;height:100%!important;
    object-fit:cover!important;transform:translateZ(0)}   /* 両方coverで同じ拡縮→立方体が保たれ位置も合う */
  #arjs-video, .arjs-video, video{z-index:0!important}             /* カメラ映像：奥 */
  .a-canvas{z-index:1!important;background:transparent!important}   /* 3D：手前・透過 */
</style>
<script src="./vendor/arjs/aframe.min.js"></script>
<script src="./vendor/arjs/aframe-ar.js"></script>
</head>
<body>
  <div class="top">
    <button class="btn" id="back">← もどる</button>
    <div class="seg" role="group">
      <button id="mMake" class="on make">つくる</button>
      <button id="mErase">けす</button>
    </div>
    <span class="pill">ブロック <span id="count">0</span></span>
  </div>

  <div id="guide">マーカーを カメラに うつしてね 🟦<br>うつると 作品が あらわれるよ</div>

  <a-scene embedded vr-mode-ui="enabled: false" renderer="antialias: true; alpha: true; precision: medium"
    arjs="sourceType: webcam; detectionMode: mono; debugUIEnabled: false; cameraParametersUrl: ./vendor/arjs/camera_para.dat;">
    <a-marker id="marker" type="pattern" url="./vendor/arjs/patt.hiro" smooth="true" smoothCount="6" smoothTolerance="0.01" smoothThreshold="3">
      <a-entity id="root"></a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

<script>
  const THREE = AFRAME.THREE;
  const sceneEl = document.querySelector('a-scene');
  const markerEl = document.querySelector('#marker');
  const rootEl = document.querySelector('#root');
  const countEl = document.getElementById('count');
  const guide = document.getElementById('guide');

  const COLOR = 0x9AA0A6;
  const FIT_SCALE = 0.5;          // 1ブロック=マーカーの約0.5倍の「固定サイズ」。作品が大きくなっても縮まない（調整可）
  const LIMIT = 30;               // 作品の最大サイズ（各軸30マスまで）。これ以上は大きくできない
  const FOUND_MSG = '✅ でたよ！ ブロックの<b>面をタップ</b>でくっつく ／ 「けす」でけせる';
  let mode = 'make';

  // マーカー空間に置く描画ツリー
  let root = null, build = null;
  let meshes = [];                // 立方体メッシュ
  const occ = new Map();          // "x,y,z" -> mesh（重複・削除用）
  let blocks = [];                // {x,y,z} の配列（保存用の真実）

  const boxGeo = new THREE.BoxGeometry(0.98, 0.98, 0.98);
  const edgeGeo = new THREE.EdgesGeometry(boxGeo);
  const edgeMat = new THREE.LineBasicMaterial({ color:0x0b0f18, transparent:true, opacity:0.25 });
  const key = (x,y,z)=> x+','+y+','+z;

  sceneEl.addEventListener('loaded', ()=>{
    root = rootEl.object3D;
    build = new THREE.Group();          // ここにキューブ。位置/スケールでマーカーに合わせる
    root.add(build);
    // ライト（AR.jsはライトを足さないので自前で）
    root.add(new THREE.HemisphereLight(0xffffff, 0x445566, 1.1));
    const dir = new THREE.DirectionalLight(0xffffff, 0.9); dir.position.set(2,4,3); root.add(dir);
    loadBlocks();
    rebuild();
  });

  markerEl.addEventListener('markerFound', ()=>{ guide.innerHTML = FOUND_MSG; });
  markerEl.addEventListener('markerLost',  ()=>{
    guide.innerHTML = 'マーカーを カメラに うつしてね 🟦';
  });

  // ---- データ ----
  function loadBlocks(){
    try{ blocks = JSON.parse(localStorage.getItem('qbu_blocks') || '[]'); }catch(_){ blocks = []; }
    if (!Array.isArray(blocks)) blocks = [];
    if (blocks.length === 0) blocks = [{x:0,y:0,z:0}];   // 空なら起点キューブ1個から（ここに面をくっつけていく）
  }
  function saveBlocks(){
    try{ localStorage.setItem('qbu_blocks', JSON.stringify(blocks)); }catch(_){}
  }

  // ---- 描画（blocks → meshes）＋ マーカーに収まる位置・スケール ----
  function rebuild(){
    meshes.forEach(m=>{ build.remove(m); m.material.dispose(); });
    meshes = []; occ.clear();
    blocks.forEach(b=> addMesh(b.x, b.y, b.z));
    fit();
    updateCount();
  }
  function addMesh(x,y,z){
    const mat = new THREE.MeshStandardMaterial({ color:COLOR, roughness:0.85 });
    const m = new THREE.Mesh(boxGeo, mat);
    m.position.set(x,y,z);
    m.add(new THREE.LineSegments(edgeGeo, edgeMat));
    build.add(m); meshes.push(m); occ.set(key(x,y,z), m);
    return m;
  }
  // 固定サイズ（縮まない）＋ X/Z中心をマーカー中央へ・最下段をマーカー面へ
  function fit(){
    build.scale.setScalar(FIT_SCALE);
    if (!blocks.length){ build.position.set(0,0,0); return; }
    let minX=1e9,maxX=-1e9,minY=1e9,minZ=1e9,maxZ=-1e9;
    blocks.forEach(b=>{ minX=Math.min(minX,b.x);maxX=Math.max(maxX,b.x);
      minY=Math.min(minY,b.y);minZ=Math.min(minZ,b.z);maxZ=Math.max(maxZ,b.z); });
    const cx=(minX+maxX)/2, cz=(minZ+maxZ)/2;
    build.position.set(-cx*FIT_SCALE, -(minY-0.5)*FIT_SCALE, -cz*FIT_SCALE);
  }
  function updateCount(){ countEl.textContent = meshes.length; }

  // ---- タップで追加/削除（追加は「既存ブロックの面にくっつく」だけ＝床置き・浮きナシ）----
  const raycaster = new THREE.Raycaster();
  const ndc = new THREE.Vector2();
  let downX=0, downY=0, moved=false;

  function getCanvas(){ return sceneEl.canvas; }
  window.addEventListener('pointerdown', e=>{ downX=e.clientX; downY=e.clientY; moved=false; }, true);
  window.addEventListener('pointermove', e=>{ if(Math.abs(e.clientX-downX)>10||Math.abs(e.clientY-downY)>10) moved=true; }, true);
  window.addEventListener('pointerup', e=>{
    if (moved) return;
    if (e.target.closest('.top') || e.target.closest('#guide')) return;  // UI操作は除外
    onTap(e.clientX, e.clientY);
  }, true);

  function onTap(cx, cy){
    if (!build || !meshes.length) return;
    const cam = sceneEl.camera;
    const r = getCanvas().getBoundingClientRect();
    ndc.x = ((cx - r.left)/r.width)*2 - 1;
    ndc.y = -((cy - r.top)/r.height)*2 + 1;
    raycaster.setFromCamera(ndc, cam);
    const hits = raycaster.intersectObjects(meshes, false);   // ブロックだけ（床なし）＝面をタップした時だけ反応
    if (!hits.length) return;
    const h = hits[0];
    if (mode === 'make'){
      const n = h.face.normal;                                // タップした面の向き
      const p = h.object.position;
      place(Math.round(p.x + n.x), Math.round(p.y + n.y), Math.round(p.z + n.z));  // 面にくっつけて1個追加
    } else {
      remove(h.object);
    }
  }
  // 各軸の広がりが LIMIT(30マス) を超える置き方は禁止＝作品サイズの上限
  function withinLimit(x,y,z){
    let mnX=x,mxX=x,mnY=y,mxY=y,mnZ=z,mxZ=z;
    blocks.forEach(b=>{ mnX=Math.min(mnX,b.x);mxX=Math.max(mxX,b.x);
      mnY=Math.min(mnY,b.y);mxY=Math.max(mxY,b.y);mnZ=Math.min(mnZ,b.z);mxZ=Math.max(mxZ,b.z); });
    return (mxX-mnX+1)<=LIMIT && (mxY-mnY+1)<=LIMIT && (mxZ-mnZ+1)<=LIMIT;
  }
  let guideTimer = null;
  function flashGuide(msg){                       // 一時メッセージ→1.3秒後に通常案内へ戻す
    guide.innerHTML = msg;
    clearTimeout(guideTimer);
    guideTimer = setTimeout(()=>{ guide.innerHTML = FOUND_MSG; }, 1300);
  }
  function place(x,y,z){
    if (occ.has(key(x,y,z))) return;
    if (!withinLimit(x,y,z)){ flashGuide('これ以上は 大きくできないよ（30マスまで）'); return; }
    blocks.push({x,y,z}); addMesh(x,y,z);
    fit(); updateCount(); saveBlocks();
  }
  function remove(m){
    const p = m.position;
    blocks = blocks.filter(b=> !(b.x===p.x && b.y===p.y && b.z===p.z));
    build.remove(m); m.material.dispose();
    meshes = meshes.filter(x=>x!==m); occ.delete(key(p.x,p.y,p.z));
    if (!blocks.length){ blocks = [{x:0,y:0,z:0}]; rebuild(); }  // 全部消えたら起点を復活（面が無くて詰むのを防ぐ）
    else { fit(); updateCount(); }
    saveBlocks();
  }

  // ---- UI ----
  document.getElementById('back').onclick = ()=>{ location.href = './mock.html'; };
  const mMake = document.getElementById('mMake'), mErase = document.getElementById('mErase');
  mMake.onclick = ()=>{ mode='make'; mMake.className='on make'; mErase.className=''; };
  mErase.onclick = ()=>{ mode='erase'; mErase.className='on erase'; mMake.className=''; };

  // ---- iOSの黒画面対策＆切り分け：AR.jsのvideoを確実に再生し、状態を表示 ----
  function arVideo(){ return document.querySelector('#arjs-video') || document.querySelector('video'); }
  function tryPlayVideo(){ const v = arVideo(); if (v && v.paused) v.play().catch(()=>{}); }
  window.addEventListener('arjs-video-loaded', tryPlayVideo);   // AR.jsがvideo準備完了で発火
  window.addEventListener('pointerup', tryPlayVideo, true);     // 最初のタップでも再生を後押し
</script>
</body>
</html>
